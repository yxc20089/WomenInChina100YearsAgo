schema_version = 1

[ocr]
engine = "transformers"
model_name = "tencent/HunyuanOCR"
model_revision = "de8f10ad2f00a0cefd790b526de8a65dcfdb3205"
toolkit_name = "Tencent-Hunyuan/HunyuanOCR"
toolkit_revision = "a1ce1099db98edceb153710536af23edf4391cf0"
pipeline = "spotting_json+layout_parse"
spotting_task = "spotting_json"
spotting_prompt = "检测并识别图中所有的文字行，请按从上到下、从左到右的阅读顺序进行识别。 输出格式为 JSON 数组，每个元素必须包含：\"box\": [xmin, ymin, xmax, ymax]（坐标需归一化到 [0, 1000] 范围内）；\"text\": \"识别出的文字内容\"。 注意：请直接输出 JSON 数组，不要包含任何多余的描述性文字。"
layout_task = "layout_parse"
layout_prompt = "提取文档图片中所有内容用markdown格式表示，表格用html格式表达，文档中公式用latex格式表示，请按照阅读顺序组织进行全文解析，并输出版式分析信息。"
language = "zh-Hant"
temperature = 0.0
top_p = 1.0
runtime = "transformers-cuda"
dtype = "bfloat16"
device = "cuda"
max_new_tokens = 16384
repetition_penalty = 1.08
confidence_status = "not_emitted_by_model"
confidence_calibration = "not_available"

# Frontier OCR for article-block crops (owner ruling 2026-07-20: frontier
# models via OpenRouter for the two one-time ingestion passes; switch model
# by editing served_model only).
[frontier_ocr]
provider = "openrouter"
base_url = "https://openrouter.ai/api/v1"
served_model = "google/gemini-3.5-flash"
model_name = "Gemini 3.5 Flash"
api_key_environment_variable = "OPENROUTER_API_KEY"
model_revision_status = "not_available"
weight_hash_status = "not_available"
quantization_status = "not_disclosed_by_provider"
temperature = 0.0
max_output_tokens = 16384
timeout_seconds = 300.0
language = "zh-Hant"
prompt = "這是一張1920年代《申報》報紙的一個版面區塊（直排繁體中文，閱讀順序由上到下、由右至左）。請完整轉錄圖中所有文字：保留繁體字形，不要簡化、不要翻譯、不要補全缺損字（無法辨認處用□表示）；按閱讀順序輸出純文字，欄與欄之間用換行分隔；不要添加任何說明或其他內容。"

[semantic]
provider = "openrouter"
base_url = "https://openrouter.ai/api/v1"
served_model = "google/gemini-3.5-flash"
model_name = "Gemini 3.5 Flash"
api_key_environment_variable = "OPENROUTER_API_KEY"
model_revision_status = "not_available"
weight_hash_status = "not_available"
quantization_status = "not_disclosed_by_provider"
thinking = false
temperature = 0.0
seed = 42
context_length = 200000
max_output_tokens = 16384
timeout_seconds = 300.0
structured_output = "openai_response_format_json_schema"

[retrieval.passage_embedding]
engine = "sentence-transformers"
model_name = "BAAI/bge-m3"
model_revision = "5617a9f61b028005a4858fdac845db406aefb181"
dimension = 1024
normalize = true

[identity]
# Research-only candidate stack. The first-build planner and installed CLI do
# not invoke global matching or canonical merge.
enabled = false

[identity.embedding]
engine = "sentence-transformers"
model_name = "Qwen/Qwen3-Embedding-0.6B"
model_revision = "97b0c614be4d77ee51c0cef4e5f07c00f9eb65b3"
dimension = 1024
normalize = true

[identity.reranker]
engine = "sentence-transformers"
model_name = "Qwen/Qwen3-Reranker-0.6B"
model_revision = "e61197ed45024b0ed8a2d74b80b4d909f1255473"
